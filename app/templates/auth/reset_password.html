{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <div class="card">
        <h1 style="text-align: center; color: rgb(34, 139, 34); margin-bottom: 30px;">Set New Password</h1>

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="8">
                <small style="color: #666;">Minimum 8 characters</small>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" class="form-control" required minlength="8">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
